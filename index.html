<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>MULTISIG</title>

  <link rel="icon" type="image/png" sizes="32x32"
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="apple-touch-icon"
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="manifest" href="manifest.json">

  <script>
    var BASE_URL = "https://script.google.com/macros/s/AKfycbwZhLRPno6mRnhaOpsEtL8D3L_WBGB2__m2zzUpwoiv-HtoT_gQ-ytlTrUC5z4KNi_J1w/exec";

    function isMobileDevice() {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      var mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|phone|mobi|windows phone/i;
      var isMobileScreen = window.innerWidth <= 768;
      return mobileRegex.test(userAgent) || isMobileScreen;
    }

    var mode = isMobileDevice() ? 'mobile' : 'pc';
    window.location.href = BASE_URL + "?mode=" + mode;
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      display: none;
    }
  </style>
</head>
<body>
</body>
</html>
