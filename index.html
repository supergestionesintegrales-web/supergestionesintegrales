<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>MULTISIG</title>

  <link rel="icon" type="image/png" sizes="32x32"
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="apple-touch-icon"
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="manifest" href="manifest.json">

  <script>
    var BASE_URL = "https://script.google.com/macros/s/AKfycbwZhLRPno6mRnhaOpsEtL8D3L_WBGB2__m2zzUpwoiv-HtoT_gQ-ytlTrUC5z4KNi_J1w/exec";

    function isMobileDevice() {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      var mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|phone|mobi|windows phone/i;
      var isMobileScreen = window.innerWidth <= 768;
      return mobileRegex.test(userAgent) || isMobileScreen;
    }

    function getDeviceMode() {
      var mode = isMobileDevice() ? 'mobile' : 'pc';
      document.documentElement.setAttribute('data-device', mode);
      document.body.setAttribute('data-device', mode);
      return mode;
    }

    var deviceMode = getDeviceMode();
    var fullUrl = BASE_URL + "?mode=" + deviceMode;
    
    window.addEventListener('DOMContentLoaded', function() {
      document.getElementById('viewer').src = fullUrl;
    });

    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        var viewer = document.getElementById('viewer');
        viewer.style.height = window.innerHeight + 'px';
      }, 100);
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0; 
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
    }

    /* Estilos para móvil */
    body[data-device="mobile"] {
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    body[data-device="mobile"] #viewer {
      width: 100%;
      height: 100%;
    }

    /* Estilos para PC */
    body[data-device="pc"] #viewer {
      width: 100%;
      height: 100%;
    }

    #viewer {
      border: none;
      display: block;
      background: #fff;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    /* Media queries para mejor adaptación */
    @media (max-width: 768px) {
      body {
        height: 100vh;
      }
      
      #viewer {
        height: 100vh;
      }
    }

    @media (min-width: 769px) {
      body {
        height: 100vh;
      }
      
      #viewer {
        height: 100vh;
      }
    }

    /* Orientación landscape */
    @media (orientation: landscape) {
      body {
        height: 100vh;
      }
      
      #viewer {
        height: 100vh;
      }
    }

    /* Orientación portrait */
    @media (orientation: portrait) {
      body {
        height: 100vh;
      }
      
      #viewer {
        height: 100vh;
      }
    }

    /* Prevenir scrollbars innecesarios */
    html, body {
      -webkit-user-select: none;
      user-select: none;
    }

    /* Asegurar que el viewer se adapte correctamente */
    body > * {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <iframe id="viewer"></iframe>
</body>
</html>
