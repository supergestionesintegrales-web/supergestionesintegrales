<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>MULTISIG</title>

  <link rel="icon" type="image/png" sizes="32x32" 
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="apple-touch-icon" 
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="manifest" href="manifest.json">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
    }

    /* ── Contenedor app ── */
    #app {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    /* ── Iframe base ── */
    #main-frame {
      border: none;
      display: block;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    /* ── Barra de carga ── */
    #loader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: transparent;
      z-index: 9999;
      overflow: hidden;
    }
    #loader::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, #4facfe, transparent);
      animation: load 1.2s infinite ease-in-out;
    }
    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>

  <div id="loader"></div>

  <div id="app">
    <iframe id="main-frame" src="" allowfullscreen
      allow="fullscreen; popups; popups-to-escape-sandbox; forms; scripts; same-origin; storage-access-by-user-activation">
    </iframe>
  </div>

  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbw4fxwPB3AnnVCrQdy-vR_zgatzQZRrhCsOeK8V5ZYZWEibxArZxJVnedeN9pZhsLEJyQ/exec";
    var frame = document.getElementById('main-frame');
    var loader = document.getElementById('loader');

    // Cargar aplicación directamente
    frame.src = APP_URL;

    // Ocultar loader cuando cargue el iframe
    frame.onload = function() {
      loader.style.display = 'none';
    };

    // Manejo de errores de carga
    frame.onerror = function() {
      loader.style.display = 'none';
      console.error('Error al cargar la aplicación');
    };

    // Ajuste responsive automático (opcional para mejor experiencia móvil)
    function adjustFrame() {
      // El iframe ya ocupa 100% del contenedor, pero podemos asegurar que se adapte
      frame.style.width = '100%';
      frame.style.height = '100%';
    }

    window.addEventListener('resize', adjustFrame);
    window.addEventListener('load', adjustFrame);
  </script>

</body>
</html>
