<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>MULTISIG</title>

  <link rel="icon" type="image/png" sizes="32x32" 
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="apple-touch-icon" 
        href="https://static.vecteezy.com/system/resources/previews/053/387/130/non_2x/multitasking-concept-line-icon-simple-element-illustration-multitasking-concept-outline-symbol-design-vector.jpg">
  <link rel="manifest" href="manifest.json">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
    }

    /* ── Selector ── */
    #selector {
      display: -webkit-flex;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      gap: 32px;
      position: absolute;
      top: 0; left: 0;
      z-index: 10;
    }

    #selector .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #e0e0e0;
    }

    #selector .subtitle {
      font-size: 0.95rem;
      color: #a0aec0;
      margin-top: -20px;
    }

    #selector .cards {
      display: -webkit-flex;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 36px 40px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s, background 0.2s;
      min-width: 160px;
    }

    .mode-card:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-4px);
    }

    .mode-card .icon { font-size: 3rem; margin-bottom: 12px; }
    .mode-card .label { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
    .mode-card .desc  { font-size: 0.78rem; color: #90a0b7; margin-top: 6px; }

    /* ── Contenedor app ── */
    #app {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* ── Iframe base ── */
    #main-frame {
      border: none;
      display: block;
    }

    /* ── Botón cambiar vista ── */
    #switch-btn {
      position: fixed;
      top: 8px; left: 8px;
      z-index: 9999;
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 0.65rem;
      cursor: pointer;
      display: none;
      -webkit-align-items: center;
      align-items: center;
      gap: 3px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      transition: background 0.2s, color 0.2s;
      line-height: 1.4;
    }

    #switch-btn:hover {
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.85);
    }
  </style>
</head>
<body>

  <div id="selector">
    <div class="logo">MULTISIG</div>
    <div class="subtitle">Selecciona cómo deseas acceder</div>
    <div class="cards">
      <div class="mode-card" onclick="launch('pc')">
        <div class="icon">🖥️</div>
        <div class="label">Modo PC</div>
        <div class="desc">Vista completa de escritorio</div>
      </div>
      <div class="mode-card" onclick="launch('mobile')">
        <div class="icon">📱</div>
        <div class="label">Modo Móvil</div>
        <div class="desc">Vista optimizada para teléfono</div>
      </div>
    </div>
  </div>

  <div id="app">
    <iframe id="main-frame" src="" allowfullscreen
      allow="fullscreen; popups; popups-to-escape-sandbox; forms; scripts; same-origin; storage-access-by-user-activation">
    </iframe>
  </div>

  <button id="switch-btn" onclick="backToSelector()">⇄ vista</button>

  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbz2oNEuUWAzrUIGJqvXl3R-VpgfAFCFIHVY-hDoEGOhCClAZ0J11T3sLdj2bKZaTmwF/exec";
    // Viewport virtual móvil en proporción 9:16
    var MOBILE_W = 390;
    var MOBILE_H = Math.round(MOBILE_W * 16 / 9); // 693px

    function launch(mode) {
      var selector = document.getElementById('selector');
      var app      = document.getElementById('app');
      var frame    = document.getElementById('main-frame');
      var btn      = document.getElementById('switch-btn');

      selector.style.display = 'none';
      app.style.display = 'block';
      btn.style.display = '-webkit-inline-flex';
      btn.style.display = 'inline-flex';

      applyMode(mode, frame);

      if (!frame.src || frame.src === 'about:blank' || frame.src === window.location.href) {
        frame.src = APP_URL;
      }

      window._currentMode = mode;
    }

    function applyMode(mode, frame) {
      var vw = window.innerWidth;
      var vh = window.innerHeight;

      if (mode === 'pc') {
        // PC: iframe ocupa todo, sin transformación
        frame.style.width     = vw + 'px';
        frame.style.height    = vh + 'px';
        frame.style.transform = 'none';
        frame.style.transformOrigin = 'top left';
        frame.style.position  = 'absolute';
        frame.style.top       = '0';
        frame.style.left      = '0';

      } else {
        // MÓVIL: viewport fijo 9:16 (390x693) escalado para llenar pantalla
        // Se escala por el eje que mejor encaje sin deformar
        var scaleX = vw / MOBILE_W;
        var scaleY = vh / MOBILE_H;
        var scale  = Math.min(scaleX, scaleY); // fit sin distorsión

        var offsetX = (vw - MOBILE_W * scale) / 2;
        var offsetY = (vh - MOBILE_H * scale) / 2;

        frame.style.width          = MOBILE_W + 'px';
        frame.style.height         = MOBILE_H + 'px';
        frame.style.transform      = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
        frame.style.transformOrigin = 'top left';
        frame.style.position       = 'absolute';
        frame.style.top            = '0';
        frame.style.left           = '0';
      }
    }

    function backToSelector() {
      var frame = document.getElementById('main-frame');
      frame.style.transform = 'none';
      document.getElementById('selector').style.display = '-webkit-flex';
      document.getElementById('selector').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      document.getElementById('switch-btn').style.display = 'none';
    }

    // Re-aplicar al redimensionar ventana
    window.addEventListener('resize', function() {
      if (window._currentMode) {
        applyMode(window._currentMode, document.getElementById('main-frame'));
      }
    });
  </script>

</body>
</html>
